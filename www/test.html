<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page - Java Server</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            max-width: 500px;
        }
        h2 { color: #38bdf8; margin-top: 0; }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #3b82f6;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            transition: 0.2s;
        }
        .back-btn:hover { background: #2563eb; }
        .code-block {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            font-family: monospace;
            color: #10b981;
            margin: 20px 0;
            text-align: left;
        }
    </style>
</head>
<body>
    <div class="glass-panel">
        <h2>System Diagnostics</h2>
        <p>This is a test page served securely via standard IO file reading.</p>
        <div class="code-block">
            > Connection Established<br>
            > Headers parsed... OK<br>
            > Reading file content... OK<br>
            > Status: 200 OK
        </div>
        <p>Your server's threading model is correctly handling this request!</p>
        <a href="/" class="back-btn">← Back to Dashboard</a>
    </div>
</body>
</html>
